<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Équilibre — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26;
    --border:rgba(255,255,255,0.07); --accent:#c8f564;
    --accent2:#6478f5; --accent3:#f564a9;
    --text:#e8e8f0; --muted:#6b6b80; --danger:#f56464;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;animation:float 10s ease-in-out infinite alternate;}
  .orb1{width:500px;height:500px;background:rgba(100,120,245,0.12);top:-100px;left:-100px;}
  .orb2{width:400px;height:400px;background:rgba(200,245,100,0.07);bottom:-80px;right:-80px;animation-delay:-4s;}
  .orb3{width:300px;height:300px;background:rgba(245,100,169,0.07);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-2s;}
  @keyframes float{0%{transform:translate(0,0) scale(1)}100%{transform:translate(20px,30px) scale(1.05)}}
  .grain{position:fixed;inset:0;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");pointer-events:none;z-index:1;}
  .card{position:relative;z-index:2;background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:3rem 2.5rem;width:100%;max-width:440px;margin:1rem;box-shadow:0 40px 80px rgba(0,0,0,0.4);animation:cardIn 0.7s cubic-bezier(0.23,1,0.32,1) both;}
  @keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);border-radius:28px 28px 0 0;}
  .logo{display:flex;align-items:center;gap:0.75rem;margin-bottom:2.5rem;}
  .logo-mark{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent2),var(--accent3));display:flex;align-items:center;justify-content:center;font-size:18px;}
  .logo-text{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;}
  .logo-text span{color:var(--accent);}
  .tabs{display:flex;gap:0.5rem;background:var(--surface2);border-radius:12px;padding:4px;margin-bottom:2rem;}
  .tab{flex:1;text-align:center;padding:0.6rem;border-radius:9px;font-size:0.85rem;cursor:pointer;transition:all 0.25s;color:var(--muted);border:none;background:none;font-family:'DM Sans',sans-serif;}
  .tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.3);}
  .form-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;letter-spacing:-0.02em;margin-bottom:0.4rem;}
  .form-sub{font-size:0.82rem;color:var(--muted);margin-bottom:1.75rem;line-height:1.5;}
  .field{margin-bottom:1rem;}
  .field label{display:block;font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:0.4rem;}
  .field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:0.8rem 1rem;font-size:0.9rem;color:var(--text);font-family:'DM Sans',sans-serif;transition:border-color 0.2s,box-shadow 0.2s;outline:none;}
  .field input:focus{border-color:rgba(100,120,245,0.5);box-shadow:0 0 0 3px rgba(100,120,245,0.1);}
  .field input::placeholder{color:var(--muted);}
  .btn{width:100%;padding:0.9rem;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;cursor:pointer;transition:all 0.2s;margin-top:0.5rem;}
  .btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#000;font-weight:600;}
  .btn-primary:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 8px 20px rgba(100,120,245,0.3);}
  .btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
  .error-msg{background:rgba(245,100,100,0.1);border:1px solid rgba(245,100,100,0.25);border-radius:10px;padding:0.7rem 1rem;font-size:0.8rem;color:var(--danger);margin-bottom:1rem;display:none;}
  .success-msg{background:rgba(200,245,100,0.1);border:1px solid rgba(200,245,100,0.25);border-radius:10px;padding:0.7rem 1rem;font-size:0.8rem;color:var(--accent);margin-bottom:1rem;display:none;}
  .footer-note{text-align:center;font-size:0.72rem;color:var(--muted);margin-top:1.5rem;line-height:1.6;}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:6px;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="grain"></div>

<div class="card">
  <div class="logo">
    <div class="logo-mark">🌿</div>
    <div class="logo-text">Équi<span>libre</span></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('login',this)">Connexion</button>
    <button class="tab" onclick="switchTab('signup',this)">Inscription</button>
  </div>

  <div id="loginForm">
    <div class="form-title">Bon retour 👋</div>
    <div class="form-sub">Connectez-vous pour accéder à votre tableau de bord.</div>
    <div class="error-msg" id="loginError"></div>
    <div class="field"><label>Adresse e-mail</label><input type="email" id="loginEmail" placeholder="vous@exemple.com"></div>
    <div class="field"><label>Mot de passe</label><input type="password" id="loginPassword" placeholder="••••••••"></div>
    <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">Se connecter</button>
  </div>

  <div id="signupForm" style="display:none;">
    <div class="form-title">Créer un compte</div>
    <div class="form-sub">Commencez à reprendre le contrôle de votre bien-être numérique.</div>
    <div class="error-msg" id="signupError"></div>
    <div class="success-msg" id="signupSuccess"></div>
    <div class="field"><label>Prénom</label><input type="text" id="signupName" placeholder="Votre prénom"></div>
    <div class="field"><label>Adresse e-mail</label><input type="email" id="signupEmail" placeholder="vous@exemple.com"></div>
    <div class="field"><label>Mot de passe</label><input type="password" id="signupPassword" placeholder="Min. 6 caractères"></div>
    <button class="btn btn-primary" id="signupBtn" onclick="handleSignup()">Créer mon compte</button>
  </div>

  <div class="footer-note">Vos données sont privées et sécurisées. 🔒</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyAXZURCpn20cJxod8WbNUw5JaWLKoGaaD4",
  authDomain: "global-467b3.firebaseapp.com",
  projectId: "global-467b3",
  storageBucket: "global-467b3.firebasestorage.app",
  messagingSenderId: "287601791180",
  appId: "1:287601791180:web:ae5b65a0e92a3bc8c73269"
});
const auth = getAuth(app);

onAuthStateChanged(auth, user => { if (user) window.location.href = 'dashboard.html'; });

function showError(id, msg) { const el=document.getElementById(id); el.textContent=msg; el.style.display='block'; setTimeout(()=>el.style.display='none',5000); }
function showSuccess(id, msg) { const el=document.getElementById(id); el.textContent=msg; el.style.display='block'; }
function setLoading(id, on, label) { const b=document.getElementById(id); b.disabled=on; b.innerHTML=on?'<span class="spinner"></span> Chargement...':label; }
function friendlyError(code) {
  return { 'auth/user-not-found':'Aucun compte avec cet e-mail.', 'auth/wrong-password':'Mot de passe incorrect.', 'auth/email-already-in-use':'Cet e-mail est déjà utilisé.', 'auth/weak-password':'Mot de passe trop faible (min. 6 caractères).', 'auth/invalid-email':'Adresse e-mail invalide.', 'auth/invalid-credential':'E-mail ou mot de passe incorrect.', 'auth/too-many-requests':'Trop de tentatives. Réessayez plus tard.' }[code] || 'Une erreur est survenue. Réessayez.';
}

window.switchTab = (tab, el) => {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('signupForm').style.display = tab==='signup'?'block':'none';
};

window.handleLogin = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  if (!email||!pass) return showError('loginError','Veuillez remplir tous les champs.');
  setLoading('loginBtn', true, 'Se connecter');
  try { await signInWithEmailAndPassword(auth, email, pass); window.location.href='dashboard.html'; }
  catch(e) { showError('loginError', friendlyError(e.code)); }
  finally { setLoading('loginBtn', false, 'Se connecter'); }
};

window.handleSignup = async () => {
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pass = document.getElementById('signupPassword').value;
  if (!name||!email||!pass) return showError('signupError','Veuillez remplir tous les champs.');
  setLoading('signupBtn', true, 'Créer mon compte');
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    window.location.href = 'dashboard.html';
  }
  catch(e) { showError('signupError', friendlyError(e.code)); }
  finally { setLoading('signupBtn', false, 'Créer mon compte'); }
};

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  document.getElementById('loginForm').style.display!=='none' ? window.handleLogin() : window.handleSignup();
});
</script>
</body>
</html>
